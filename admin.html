<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vic Local Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e0d; color: #e8e6e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #141413; border: 1px solid #1c1c1a; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
.admin-wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #1c1c1a; }
.admin-header h1 { font-size: 20px; font-weight: 600; }
.view-site { font-size: 13px; color: #555553; text-decoration: none; }
.view-site:hover { color: #e8e6e0; }
.logout { font-size: 12px; color: #444442; cursor: pointer; margin-left: 1rem; }
.logout:hover { color: #888886; }
.section { background: #141413; border: 1px solid #1c1c1a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
.section-title { font-size: 11px; color: #555553; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.25rem; }
label { display: block; font-size: 12px; color: #666664; margin-bottom: 5px; margin-top: 1rem; }
label:first-of-type { margin-top: 0; }
input, select, textarea { width: 100%; background: #0e0e0d; border: 1px solid #222220; border-radius: 8px; padding: 10px 12px; color: #e8e6e0; font-size: 14px; font-family: inherit; outline: none; transition: border 0.2s; }
input:focus, select:focus, textarea:focus { border-color: #444442; }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
select option { background: #0e0e0d; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 1rem; }
.checkbox-row input { width: auto; accent-color: #e8e6e0; }
.checkbox-row label { margin: 0; font-size: 14px; color: #aaa8a2; }
.submit-btn { width: 100%; background: #e8e6e0; color: #0e0e0d; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s; }
.submit-btn:hover { opacity: 0.88; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 1rem; text-align: center; }
.msg.success { background: #0a2e26; color: #9fe1cb; border: 1px solid #0f6e56; }
.msg.error { background: #2a0a0a; color: #f7c1c1; border: 1px solid #a32d2d; }
.ai-row { display: flex; gap: 8px; }
.ai-input { flex: 1; background: #0e0e0d; border: 1px solid #222220; border-radius: 8px; padding: 10px 12px; color: #e8e6e0; font-size: 14px; font-family: inherit; outline: none; }
.ai-input:focus { border-color: #444442; }
.ai-btn { background: #e8e6e0; color: #0e0e0d; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.ai-btn:hover { opacity: 0.88; }
.ai-btn:disabled { opacity: 0.4; cursor: default; }
.ai-hint { font-size: 11px; color: #333331; margin-top: 8px; }
.ai-status { font-size: 12px; color: #9fe1cb; margin-top: 8px; display: none; }
.photos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
.photo-slot { aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; position: relative; background: #0e0e0d; border: 1.5px dashed #222220; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.photo-slot:hover { border-color: #444442; }
.photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-slot img { width: 100%; height: 100%; object-fit: cover; }
.slot-icon { color: #333331; font-size: 22px; pointer-events: none; }
.slot-num { position: absolute; bottom: 4px; right: 6px; font-size: 10px; color: #2a2a28; pointer-events: none; }
.remove-photo { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.75); border: none; color: #e8e6e0; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 2; }
.photo-slot:hover .remove-photo { display: flex; }
.upload-hint { font-size: 11px; color: #333331; }
.uploading-indicator { font-size: 11px; color: #9fe1cb; margin-top: 4px; display: none; }
.item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: #0e0e0d; border-radius: 8px; margin-bottom: 6px; border: 1px solid #1a1a18; }
.item-thumbs { display: flex; gap: 4px; flex-shrink: 0; }
.item-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }
.item-thumb-placeholder { width: 44px; height: 44px; border-radius: 6px; background: #1a1a18; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 13px; color: #c8c6c0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 11px; color: #444442; margin-top: 2px; }
.item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.toggle-btn { background: #1a1a18; border: 1px solid #2a2a28; color: #888886; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.toggle-btn:hover { border-color: #444442; color: #e8e6e0; }
.delete-btn { background: #1a0a0a; border: 1px solid #3a1a1a; color: #a32d2d; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
.delete-btn:hover { background: #2a1010; }
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div style="font-size:11px;color:#444442;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.5rem;">Vic Local Admin</div>
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="submit-btn" onclick="login()" style="margin-top:1.25rem;">Enter</button>
    <div id="login-msg"></div>
  </div>
</div>

<div class="admin-wrap" id="admin-screen" style="display:none;">
  <div class="admin-header">
    <h1>Add New Item</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <a class="view-site" href="https://vic-local.vercel.app" target="_blank">View site</a>
      <span class="logout" onclick="logout()">Log out</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">AI Auto-fill</div>
    <div class="ai-row">
      <input class="ai-input" type="text" id="ai-prompt" placeholder="FOG essentials shorts M $50" onkeydown="if(event.key==='Enter')runAI()">
      <button class="ai-btn" id="ai-btn" onclick="runAI()">Fill with AI</button>
    </div>
    <div class="ai-hint">Upload photo first, then type brand / size / price and hit Fill with AI.</div>
    <div class="ai-status" id="ai-status"></div>
  </div>

  <div class="section">
    <div class="section-title">Photos (up to 4)</div>
    <div class="photos-grid">
      <div class="photo-slot" id="slot-0"><input type="file" accept="image/*" onchange="handlePhoto(event,0)"><div class="slot-icon">+</div><div class="slot-num">1</div></div>
      <div class="photo-slot" id="slot-1"><input type="file" accept="image/*" onchange="handlePhoto(event,1)"><div class="slot-icon">+</div><div class="slot-num">2</div></div>
      <div class="photo-slot" id="slot-2"><input type="file" accept="image/*" onchange="handlePhoto(event,2)"><div class="slot-icon">+</div><div class="slot-num">3</div></div>
      <div class="photo-slot" id="slot-3"><input type="file" accept="image/*" onchange="handlePhoto(event,3)"><div class="slot-icon">+</div><div class="slot-num">4</div></div>
    </div>
    <div class="upload-hint">First photo is the cover shot.</div>
    <div class="uploading-indicator" id="uploading-indicator">Uploading...</div>
  </div>

  <div class="section">
    <div class="section-title">Item Details</div>
    <label>Brand</label>
    <input type="text" id="brand" placeholder="Fear of God Essentials">
    <label>Name</label>
    <input type="text" id="name" placeholder="Essentials Sweat Shorts">
    <div class="row">
      <div><label>Price (CAD)</label><input type="number" id="price" placeholder="50"></div>
      <div><label>Sizes (comma separated)</label><input type="text" id="sizes" placeholder="S,M,L or 32x32"></div></div><label>Sold Out Sizes (leave blank if none)</label><input type="text" id="sold_sizes" placeholder="S,M — blank if all available"><div class="row" style="display:none">
    </div>
    <label>Category</label>
    <select id="category">
      <option value="shirts">Shirts</option>
      <option value="hoodies">Hoodies</option>
      <option value="shorts">Shorts</option>
      <option value="belts">Belts</option>
      <option value="kakobuy">Kakobuy</option>
      <option value="other">Other</option>
    </select>
    <label>Tags (comma separated — color, brand, type)</label>
    <input type="text" id="tags" placeholder="grey, essentials, shorts, fog">
    <label>Description</label>
    <textarea id="description" placeholder="AI will write this for you..."></textarea>
    <div class="checkbox-row"><input type="checkbox" id="is_new" checked><label for="is_new">Mark as New</label></div>
    <div class="checkbox-row"><input type="checkbox" id="sold"><label for="sold">Already Sold</label></div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="addItem()">Add Item to Site</button>
  <div id="msg"></div>

  <div class="section" style="margin-top:1.5rem;">
    <div class="section-title">Current Items</div>
    <div id="current-items"><div style="color:#333331;font-size:13px;">Loading...</div></div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://uyuyerbyjelelkshmmpn.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dXllcmJ5amVsZWxrc2htbXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTI2NTgsImV4cCI6MjA5NTkyODY1OH0.zM93TUtb3ZUF9PP5R_4ZA9ke0FcYXJaim4W1t7OfnYE';
var ADMIN_PASSWORD = 'viclocal2024';
var BUCKET = 'item-photos';
var uploadedUrls = [null,null,null,null];
var uploadingCount = 0;
var firstPhotoBase64 = null;
var firstPhotoMime = 'image/jpeg';

function hdrs(extra) {
  var h = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Accept-Profile': 'public', 'Content-Profile': 'public' };
  if (extra) Object.assign(h, extra);
  return h;
}

function login() {
  if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadCurrentItems();
  } else {
    document.getElementById('login-msg').innerHTML = '<div class="msg error">Wrong password</div>';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('password-input').value = '';
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhoto(event, slotIdx) {
  var file = event.target.files[0];
  if (!file) return;
  var slot = document.getElementById('slot-' + slotIdx);
  var preview = document.createElement('img');
  preview.src = URL.createObjectURL(file);
  slot.innerHTML = '';
  slot.appendChild(preview);
  var removeBtn = document.createElement('button');
  removeBtn.className = 'remove-photo';
  removeBtn.textContent = 'x';
  removeBtn.onclick = function(e) { e.stopPropagation(); removePhoto(slotIdx); };
  slot.appendChild(removeBtn);
  if (slotIdx === 0) {
    firstPhotoBase64 = await fileToBase64(file);
    firstPhotoMime = file.type || 'image/jpeg';
  }
  uploadingCount++;
  document.getElementById('uploading-indicator').style.display = 'block';
  var ext = file.name.split('.').pop();
  var fileName = Date.now() + '_' + slotIdx + '.' + ext;
  try {
    var res = await fetch(SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + fileName, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
      body: file
    });
    uploadedUrls[slotIdx] = res.ok ? SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + fileName : null;
  } catch(e) { uploadedUrls[slotIdx] = null; }
  uploadingCount--;
  if (uploadingCount === 0) document.getElementById('uploading-indicator').style.display = 'none';
}

function removePhoto(slotIdx) {
  uploadedUrls[slotIdx] = null;
  if (slotIdx === 0) firstPhotoBase64 = null;
  var slot = document.getElementById('slot-' + slotIdx);
  slot.innerHTML = '<input type="file" accept="image/*" onchange="handlePhoto(event,' + slotIdx + ')"><div class="slot-icon">+</div><div class="slot-num">' + (slotIdx+1) + '</div>';
}

async function runAI() {
  var prompt = document.getElementById('ai-prompt').value.trim();
  if (!prompt) { alert('Type the item details first'); return; }
  var btn = document.getElementById('ai-btn');
  var status = document.getElementById('ai-status');
  btn.disabled = true; btn.textContent = 'Thinking...';
  status.style.display = 'block'; status.style.color = '#9fe1cb';
  status.textContent = 'Filling your listing...';

  var systemPrompt = 'You are a listing assistant for Vic Local, a Victoria BC streetwear resell page selling kakobuy and vintage items. Return ONLY valid JSON with keys: brand, name, price (number), size, category (shirts/hoodies/shorts/belts/kakobuy/other), description. Description: max 2 sentences, straight facts, no fluff, no smoke-free/pet-free, no cringe. Mention 1:1 quality if kakobuy/replica. End with "Local pickup Victoria only." Example: "1:1 quality. Clean, tags on. Local pickup Victoria only."';

  var userContent = [];
  if (firstPhotoBase64) {
    userContent.push({ type: 'image', source: { type: 'base64', media_type: firstPhotoMime, data: firstPhotoBase64 } });
  }
  userContent.push({ type: 'text', text: 'Item: ' + prompt + '. Return only JSON, no markdown.' });

  try {
    var res = await fetch('/api/autofill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt, imageBase64: firstPhotoBase64, imageMime: firstPhotoMime })
    });
    var parsed = await res.json();
    if (parsed.error) throw new Error(parsed.error);
    if (parsed.brand) document.getElementById('brand').value = parsed.brand;
    if (parsed.name) document.getElementById('name').value = parsed.name;
    if (parsed.price) document.getElementById('price').value = parsed.price;
    if (parsed.size) document.getElementById('size').value = parsed.size;
    if (parsed.category) document.getElementById('category').value = parsed.category;
    if (parsed.sizes) document.getElementById('sizes').value = parsed.sizes;
    if (parsed.sold_sizes !== undefined) document.getElementById('sold_sizes').value = parsed.sold_sizes || '';
    if (parsed.tags) document.getElementById('tags').value = parsed.tags;
    if (parsed.description) document.getElementById('description').value = parsed.description;
    status.textContent = 'Done — check fields and hit Add Item.';
  } catch(e) {
    status.style.color = '#f7c1c1';
    status.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false; btn.textContent = 'Fill with AI';
}

async function addItem() {
  if (uploadingCount > 0) { document.getElementById('msg').innerHTML = '<div class="msg error">Wait for photos to finish uploading</div>'; return; }
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'Adding...';
  var photos = uploadedUrls.filter(Boolean);
  var item = {
    brand: document.getElementById('brand').value.trim(),
    name: document.getElementById('name').value.trim(),
    price: parseInt(document.getElementById('price').value),
    sizes: document.getElementById('sizes').value.trim() || null,
      sold_sizes: document.getElementById('sold_sizes').value.trim() || null,
    category: document.getElementById('category').value,
    description: document.getElementById('description').value.trim(),
    images: photos.length ? photos.join(',') : null,
    tags: document.getElementById('tags').value.trim() || null,
    is_new: document.getElementById('is_new').checked,
    sold: document.getElementById('sold').checked
  };
  if (!item.name || !item.brand || !item.price) {
    msg.innerHTML = '<div class="msg error">Fill in brand, name and price</div>';
    btn.disabled = false; btn.textContent = 'Add Item to Site'; return;
  }
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/items', {
      method: 'POST', headers: hdrs({'Prefer': 'return=minimal'}), body: JSON.stringify(item)
    });
    if (res.ok) {
      msg.innerHTML = '<div class="msg success">Item added! Live on the site. 🔥</div>';
      ['brand','name','price','sizes','sold_sizes','description','tags'].forEach(function(id){ document.getElementById(id).value=''; });
      uploadedUrls = [null,null,null,null]; firstPhotoBase64 = null;
      for(var i=0;i<4;i++) removePhoto(i);
      document.getElementById('is_new').checked = true;
      document.getElementById('sold').checked = false;
      document.getElementById('ai-prompt').value = '';
      document.getElementById('ai-status').style.display = 'none';
      loadCurrentItems();
    } else {
      var txt = await res.text();
      msg.innerHTML = '<div class="msg error">Error: ' + txt + '</div>';
    }
  } catch(e) { msg.innerHTML = '<div class="msg error">Connection error: ' + e.message + '</div>'; }
  btn.disabled = false; btn.textContent = 'Add Item to Site';
}

async function loadCurrentItems() {
  var div = document.getElementById('current-items');
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/items?select=*&order=id.desc', { headers: hdrs() });
    var items = await res.json();
    if (!Array.isArray(items) || items.length === 0) { div.innerHTML = '<div style="color:#333331;font-size:13px;">No items yet</div>'; return; }
    div.innerHTML = items.map(function(item) {
      var photos = item.images ? item.images.split(',').filter(Boolean) : [];
      var thumbsHtml = photos.length > 0 ? photos.slice(0,2).map(function(u){ return '<img class="item-thumb" src="' + u + '" alt="">'; }).join('') : '<div class="item-thumb-placeholder">👕</div>';
      return '<div class="item-row"><div class="item-thumbs">' + thumbsHtml + '</div>' +
        '<div class="item-info"><div class="item-name">' + (item.brand||'') + ' — ' + (item.name||'') + '</div>' +
        '<div class="item-meta">$' + item.price + ' · ' + (item.size||'') + ' · ' + (item.category||'') + (item.sold?' · SOLD':'') + ' · ' + photos.length + ' photo' + (photos.length!==1?'s':'') + '</div></div>' +
        '<div class="item-actions"><button class="toggle-btn" onclick="toggleSold(' + item.id + ',' + item.sold + ')">' + (item.sold?'Mark available':'Mark sold') + '</button>' +
        '<button class="delete-btn" onclick="deleteItem(' + item.id + ')">Delete</button></div></div>';
    }).join('');
  } catch(e) { div.innerHTML = '<div style="color:#a32d2d;font-size:13px;">Error: ' + e.message + '</div>'; }
}

async function toggleSold(id, cur) {
  await fetch(SUPABASE_URL + '/rest/v1/items?id=eq.' + id, { method: 'PATCH', headers: hdrs(), body: JSON.stringify({sold:!cur}) });
  loadCurrentItems();
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  await fetch(SUPABASE_URL + '/rest/v1/items?id=eq.' + id, { method: 'DELETE', headers: hdrs() });
  loadCurrentItems();
}
</script>
</body>
</html>
