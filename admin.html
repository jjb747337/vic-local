<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vic Local — Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111110; color: #e8e6e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #1a1a18; border: 1px solid #2c2c2a; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
  .login-box h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  .admin-wrap { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 2rem; }
  label { display: block; font-size: 12px; color: #888780; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 1rem; }
  input, select, textarea { width: 100%; background: #1a1a18; border: 1px solid #2c2c2a; border-radius: 8px; padding: 10px 12px; color: #e8e6e0; font-size: 14px; font-family: inherit; outline: none; transition: border 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: #5f5e5a; }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: #1a1a18; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 1rem; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; text-transform: none; font-size: 14px; color: #e8e6e0; letter-spacing: 0; }
  .submit-btn { width: 100%; background: #e8e6e0; color: #111110; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: opacity 0.2s; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }
  .msg { padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 1rem; text-align: center; }
  .msg.success { background: #0f6e56; color: #9fe1cb; }
  .msg.error { background: #a32d2d; color: #f7c1c1; }
  .upload-area { border: 2px dashed #2c2c2a; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; position: relative; }
  .upload-area:hover { border-color: #5f5e5a; background: #1a1a18; }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-area p { color: #888780; font-size: 13px; pointer-events: none; }
  .preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; margin-top: 0.75rem; display: none; }
  .upload-progress { height: 4px; background: #2c2c2a; border-radius: 2px; margin-top: 8px; display: none; }
  .upload-progress-bar { height: 100%; background: #9fe1cb; border-radius: 2px; width: 0%; transition: width 0.3s; }
  .upload-status { font-size: 12px; color: #9fe1cb; margin-top: 6px; display: none; }
  .items-list h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: #e8e6e0; border-top: 1px solid #2c2c2a; padding-top: 1.5rem; margin-top: 2rem; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1a1a18; border-radius: 8px; margin-bottom: 8px; }
  .item-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .item-thumb-placeholder { width: 48px; height: 48px; border-radius: 6px; background: #2c2c2a; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .item-row-info { flex: 1; font-size: 13px; min-width: 0; }
  .item-row-name { color: #e8e6e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-row-meta { color: #888780; font-size: 12px; margin-top: 2px; }
  .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .toggle-btn { background: #2c2c2a; border: 1px solid #444441; color: #e8e6e0; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .delete-btn { background: #3a1a1a; border: 1px solid #a32d2d; color: #f7c1c1; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .logout { font-size: 12px; color: #5f5e5a; cursor: pointer; }
  .logout:hover { color: #888780; }
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <h2>Vic Local Admin</h2>
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="submit-btn" onclick="login()" style="margin-top:1rem;">Enter</button>
    <div id="login-msg"></div>
  </div>
</div>

<div class="admin-wrap" id="admin-screen" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
    <h1>Add New Item</h1>
    <span class="logout" onclick="logout()">Log out</span>
  </div>

  <label>Photo</label>
  <div class="upload-area">
    <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoSelect(event)">
    <div style="font-size:28px;margin-bottom:8px;">📷</div>
    <p id="upload-text">Tap to upload photo or drag and drop</p>
  </div>
  <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-bar"></div></div>
  <div class="upload-status" id="upload-status">✓ Photo uploaded successfully</div>
  <img class="preview-img" id="preview-img" alt="Preview">

  <label>Brand</label>
  <input type="text" id="brand" placeholder="Carhartt, Fear of God, Harley Davidson...">
  <label>Item Name</label>
  <input type="text" id="name" placeholder="Essentials Sweat Shorts">
  <div class="row">
    <div><label>Price (CAD)</label><input type="number" id="price" placeholder="50"></div>
    <div><label>Size</label><input type="text" id="size" placeholder="M, L, XL, OS..."></div>
  </div>
  <label>Category</label>
  <select id="category">
    <option value="shirts">Shirts</option>
    <option value="hoodies">Hoodies</option>
    <option value="shorts">Shorts</option>
    <option value="belts">Belts</option>
    <option value="kakobuy">Kakobuy</option>
    <option value="other">Other</option>
  </select>
  <label>Description</label>
  <textarea id="description" placeholder="Clean condition, smoke-free, pet-free..."></textarea>
  <div class="checkbox-row"><input type="checkbox" id="is_new" checked><label for="is_new">Mark as New</label></div>
  <div class="checkbox-row"><input type="checkbox" id="sold"><label for="sold">Already Sold</label></div>
  <button class="submit-btn" id="submit-btn" onclick="addItem()">Add Item to Site</button>
  <div id="msg"></div>
  <div class="items-list">
    <h2>Current Items</h2>
    <div id="current-items">Loading...</div>
  </div>
</div>

<script>
  var SUPABASE_URL = 'https://uyuyerbyjelelkshmmpn.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dXllcmJ5amVsZWxrc2htbXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTI2NTgsImV4cCI6MjA5NTkyODY1OH0.zM93TUtb3ZUF9PP5R_4ZA9ke0FcYXJaim4W1t7OfnYE';
  var ADMIN_PASSWORD = 'viclocal2024';
  var BUCKET = 'item-photos';
  var uploadedImageUrl = null;

  function headers(extra) {
    var h = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Accept-Profile': 'public',
      'Content-Profile': 'public'
    };
    if (extra) Object.assign(h, extra);
    return h;
  }

  function login() {
    if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadCurrentItems();
    } else {
      document.getElementById('login-msg').innerHTML = '<div class="msg error">Wrong password</div>';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('password-input').value = '';
    uploadedImageUrl = null;
  }

  async function handlePhotoSelect(event) {
    var file = event.target.files[0];
    if (!file) return;
    var preview = document.getElementById('preview-img');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('upload-text').textContent = file.name;
    document.getElementById('upload-progress').style.display = 'block';
    document.getElementById('upload-bar').style.width = '40%';
    var ext = file.name.split('.').pop();
    var fileName = Date.now() + '.' + ext;
    try {
      var res = await fetch(SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + fileName, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': file.type,
          'x-upsert': 'true'
        },
        body: file
      });
      document.getElementById('upload-bar').style.width = '100%';
      if (res.ok) {
        uploadedImageUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + fileName;
        document.getElementById('upload-status').style.display = 'block';
      } else {
        var err = await res.json();
        document.getElementById('msg').innerHTML = '<div class="msg error">Photo upload failed: ' + (err.message||'Unknown error') + '</div>';
      }
    } catch(e) {
      document.getElementById('msg').innerHTML = '<div class="msg error">Photo upload failed.</div>';
    }
  }

  async function addItem() {
    var btn = document.getElementById('submit-btn');
    var msg = document.getElementById('msg');
    btn.disabled = true; btn.textContent = 'Adding...';
    var item = {
      brand: document.getElementById('brand').value.trim(),
      name: document.getElementById('name').value.trim(),
      price: parseInt(document.getElementById('price').value),
      size: document.getElementById('size').value.trim(),
      category: document.getElementById('category').value,
      description: document.getElementById('description').value.trim(),
      image_url: uploadedImageUrl || null,
      is_new: document.getElementById('is_new').checked,
      sold: document.getElementById('sold').checked
    };
    if (!item.name || !item.brand || !item.price) {
      msg.innerHTML = '<div class="msg error">Please fill in brand, name and price</div>';
      btn.disabled = false; btn.textContent = 'Add Item to Site'; return;
    }
    try {
      var res = await fetch(SUPABASE_URL + '/rest/v1/items', {
        method: 'POST',
        headers: headers({'Prefer': 'return=minimal'}),
        body: JSON.stringify(item)
      });
      if (res.ok) {
        msg.innerHTML = '<div class="msg success">Item added! Live on the site now. 🔥</div>';
        ['brand','name','price','size','description'].forEach(function(id){ document.getElementById(id).value=''; });
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('upload-text').textContent = 'Tap to upload photo or drag and drop';
        document.getElementById('upload-progress').style.display = 'none';
        document.getElementById('upload-bar').style.width = '0%';
        document.getElementById('upload-status').style.display = 'none';
        document.getElementById('photo-input').value = '';
        document.getElementById('is_new').checked = true;
        document.getElementById('sold').checked = false;
        uploadedImageUrl = null;
        loadCurrentItems();
      } else {
        var txt = await res.text();
        msg.innerHTML = '<div class="msg error">Error: ' + txt + '</div>';
      }
    } catch(e) {
      msg.innerHTML = '<div class="msg error">Connection error: ' + e.message + '</div>';
    }
    btn.disabled = false; btn.textContent = 'Add Item to Site';
  }

  async function loadCurrentItems() {
    var div = document.getElementById('current-items');
    try {
      var res = await fetch(SUPABASE_URL + '/rest/v1/items?select=*&order=id.desc', { headers: headers() });
      var items = await res.json();
      if (!Array.isArray(items) || items.length === 0) { div.innerHTML = '<div style="color:#5f5e5a;font-size:13px;">No items yet</div>'; return; }
      div.innerHTML = items.map(function(item) {
        return '<div class="item-row">' +
          (item.image_url ? '<img class="item-thumb" src="' + item.image_url + '" alt="">' : '<div class="item-thumb-placeholder">👕</div>') +
          '<div class="item-row-info"><div class="item-row-name">' + (item.brand||'') + ' — ' + (item.name||'') + '</div>' +
          '<div class="item-row-meta">$' + item.price + ' · ' + (item.size||'') + ' · ' + (item.category||'') + (item.sold?' · SOLD':'') + '</div></div>' +
          '<div class="item-actions">' +
          '<button class="toggle-btn" onclick="toggleSold(' + item.id + ',' + item.sold + ')">' + (item.sold?'Available':'Mark sold') + '</button>' +
          '<button class="delete-btn" onclick="deleteItem(' + item.id + ')">Delete</button>' +
          '</div></div>';
      }).join('');
    } catch(e) {
      div.innerHTML = '<div style="color:#a32d2d;font-size:13px;">Error loading items: ' + e.message + '</div>';
    }
  }

  async function toggleSold(id, currentSold) {
    await fetch(SUPABASE_URL + '/rest/v1/items?id=eq.' + id, {
      method: 'PATCH', headers: headers(), body: JSON.stringify({ sold: !currentSold })
    });
    loadCurrentItems();
  }

  async function deleteItem(id) {
    if (!confirm('Delete this item?')) return;
    await fetch(SUPABASE_URL + '/rest/v1/items?id=eq.' + id, { method: 'DELETE', headers: headers() });
    loadCurrentItems();
  }
</script>
</body>
</html>
